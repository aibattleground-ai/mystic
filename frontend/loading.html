<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OracleEyes.AI - Reading Your Destiny...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(ellipse at center, #1a0033 0%, #0a0011 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 별 배경 애니메이션 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        .loading-container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 75px rgba(212, 175, 55, 0.3);
            max-width: 500px;
            width: 90%;
        }

        /* 수정구 애니메이션 */
        .crystal-ball {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }

        .ball {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(212, 175, 55, 0.3), rgba(148, 0, 211, 0.6));
            border-radius: 50%;
            box-shadow: 
                0 0 60px rgba(212, 175, 55, 0.5),
                inset 0 0 40px rgba(148, 0, 211, 0.3),
                0 20px 40px rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateZ(0deg); }
            50% { transform: translateY(-20px) rotateZ(5deg); }
        }

        /* 수정구 내부 소용돌이 */
        .swirl {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent,
                rgba(212, 175, 55, 0.2),
                transparent
            );
            animation: swirl 8s linear infinite;
        }

        @keyframes swirl {
            100% { transform: rotate(360deg); }
        }

        /* 눈 애니메이션 */
        .oracle-eye {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            animation: blink 4s infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
        }

        @keyframes blink {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0; }
        }

        /* 로딩 텍스트 */
        .loading-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #d4af37, #fff, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .loading-subtitle {
            font-size: 1.1rem;
            color: #bbb;
            margin-bottom: 40px;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 프로그레스 바 */
        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700, #fff);
            border-radius: 10px;
            width: 0%;
            animation: loading 30s ease-out forwards;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
        }

        @keyframes loading {
            0% { width: 0%; }
            10% { width: 15%; }
            30% { width: 35%; }
            50% { width: 55%; }
            70% { width: 75%; }
            90% { width: 90%; }
            100% { width: 95%; }
        }

        /* 메시지 로테이션 */
        .messages {
            height: 60px;
            overflow: hidden;
            margin-top: 20px;
        }

        .message {
            font-size: 0.95rem;
            color: #d4af37;
            line-height: 30px;
            animation: slideUp 9s infinite;
        }

        @keyframes slideUp {
            0%, 33% { transform: translateY(0); opacity: 1; }
            33.33%, 66% { transform: translateY(-30px); opacity: 1; }
            66.66%, 100% { transform: translateY(-60px); opacity: 1; }
        }

        /* 취소 버튼 */
        .cancel-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 모바일 */
        @media (max-width: 600px) {
            .loading-title { font-size: 1.5rem; }
            .crystal-ball { width: 150px; height: 150px; }
            .oracle-eye { font-size: 45px; }
        }
    </style>
</head>
<body>
    <!-- 별 배경 -->
    <div class="stars" id="stars"></div>

    <div class="loading-container">
        <!-- 수정구 -->
        <div class="crystal-ball">
            <div class="ball">
                <div class="swirl"></div>
                <div class="oracle-eye">👁️</div>
            </div>
        </div>

        <!-- 텍스트 -->
        <h1 class="loading-title">Oracle is Reading...</h1>
        <p class="loading-subtitle">The cosmic forces are aligning for you</p>

        <!-- 프로그레스 바 -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 로딩 메시지 -->
        <div class="messages">
            <div class="message">
                ✨ Analyzing your cosmic blueprint...<br>
                🌙 Consulting the ancient wisdom...<br>
                🔮 Revealing your destiny...
            </div>
        </div>

        <!-- 취소 버튼 -->
        <button class="cancel-btn" onclick="window.location.href='/'">Cancel</button>
    </div>

    <script>
        // 별 생성
        const starsContainer = document.getElementById('stars');
        for(let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // Fortune 데이터 체크 및 로드
        let checkInterval = setInterval(() => {
            const fortuneData = sessionStorage.getItem('fortuneReady');
            if (fortuneData === 'true') {
                clearInterval(checkInterval);
                // 프로그레스 바 완료
                document.getElementById('progressBar').style.width = '100%';
                setTimeout(() => {
                    window.location.href = '/result.html';
                }, 500);
            }
        }, 500);

        // 120초 타임아웃
        setTimeout(() => {
            if (checkInterval) {
                clearInterval(checkInterval);
                alert('The Oracle is taking longer than expected. Please try again.');
                window.location.href = '/';
            }
        }, 120000);
    </script>
</body>
</html>
