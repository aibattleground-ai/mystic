<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https:; media-src *">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OracleEyes.AI - Reading Your Destiny...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(ellipse at center, #1a0033 0%, #0a0011 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .loading-container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 75px rgba(212, 175, 55, 0.3);
            max-width: 500px;
            width: 90%;
        }
        .crystal-ball { width: 200px; height: 200px; margin: 0 auto 30px; position: relative; }
        .ball {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(212, 175, 55, 0.3), rgba(148, 0, 211, 0.6));
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.5);
            animation: float 4s ease-in-out infinite;
            overflow: hidden;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .oracle-eye {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; animation: blink 4s infinite;
        }
        @keyframes blink { 0%, 90%, 100% { opacity: 1; } 95% { opacity: 0; } }
        .loading-title {
            font-size: 2rem; font-weight: 700; margin-bottom: 20px;
            color: #d4af37;
        }
        .loading-subtitle { color: #bbb; margin-bottom: 40px; }
        
        /* ▼▼▼ 2. 게이지 속도 5분(290초)에 맞게 수정 ▼▼▼ */
        .progress-container { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700, #fff);
            width: 0%;
            animation: loading 290s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards;
        }
        @keyframes loading {
            0% { width: 0%; }
            10% { width: 15%; }
            50% { width: 60%; }
            95% { width: 95%; }
            100% { width: 95%; }
        }
        .cancel-btn {
            margin-top: 30px; padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff; border-radius: 50px; cursor: pointer;
        }
        .time-warning {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5); /* 은은한 회색 */
            margin-top: 15px;
            line-height: 1.5;
            animation: pulseText 2s infinite;
        }
        
        .time-warning strong {
            color: #ffd700; /* '정밀 운명 분석'만 금색 강조 */
            font-weight: 600;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="crystal-ball">
            <div class="ball"><div class="oracle-eye">👁️</div></div>
        </div>
        <h1 class="loading-title">Oracle is Reading...</h1>
        <p class="loading-subtitle">The cosmic forces are aligning for you</p>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
    </div>

    <script>
        // 페이지 로드 직후 API 호출 실행
        window.onload = function() {
            const requestData = sessionStorage.getItem('fortuneRequestData');
            
            if (!requestData) {
                alert('No input data found.');
                window.location.href = '/';
                return;
            }

            // 백엔드 호출
            fetch('/api/fortune', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: requestData
            })
            .then(response => response.json())
            .then(data => {
                sessionStorage.setItem('fortuneData', JSON.stringify(data.fortune ?? ''));
                sessionStorage.setItem('fortuneReady', 'true');
                
                // 완료되면 즉시 이동
                document.getElementById('progressBar').style.width = '100%';
                setTimeout(() => { window.location.href = '/result.html'; }, 500);
            })
            .catch(error => {
                console.error('Error:', error);
                // 에러나도 일단 대기 (타임아웃이 처리함)
            });
        };

        // ▼▼▼ 4. 타임아웃 5분(310초)으로 설정 ▼▼▼
        setTimeout(() => {
            const isFinished = sessionStorage.getItem('fortuneReady');
            if (isFinished !== 'true') {
                alert('The Oracle is taking longer than expected. Please try again.');
                window.location.href = '/';
            }
        }, 310000);

        // ▼▼▼ 5. 버튼 클릭 이벤트 (안전한 방식) ▼▼▼
        document.getElementById('cancelBtn').addEventListener('click', function() {
            window.location.href = '/';
        });
        <script>
        // 1. 언어 감지 (한국어면 true, 아니면 false)
        const isKorean = navigator.language.includes('ko');

        window.onload = function() {
            // 5분 소요 경고 문구도 언어에 맞게 변경
            const warningEl = document.querySelector('.time-warning');
            if (warningEl) {
                warningEl.innerHTML = isKorean 
                    ? "⏳ <strong>정밀 운명 분석</strong>을 위해<br>최대 5분까지 소요될 수 있습니다."
                    : "⏳ <strong>Deep Cosmic Analysis</strong><br>May take up to 5 minutes.";
            }

            const requestData = sessionStorage.getItem('fortuneRequestData');
            if (!requestData) {
                window.location.href = '/';
                return;
            }

            fetch('/api/fortune', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: requestData
            })
            .then(response => response.json())
            .then(data => {
                sessionStorage.setItem('fortuneData', JSON.stringify(data.fortune ?? ''));
                sessionStorage.setItem('fortuneReady', 'true');
                
                document.getElementById('progressBar').style.width = '100%';
                setTimeout(() => { window.location.href = '/result.html'; }, 500);
            })
            .catch(error => {
                console.error('Error:', error);
            });
        };

        // 타임아웃 5분 10초
        setTimeout(() => {
            const isFinished = sessionStorage.getItem('fortuneReady');
            if (isFinished !== 'true') {
                alert(isKorean 
                    ? '분석 시간이 예상보다 오래 걸립니다. 다시 시도해주세요.' 
                    : 'The Oracle is taking longer than expected. Please try again.');
                window.location.href = '/';
            }
        }, 310000);

        // 취소 버튼
        document.getElementById('cancelBtn').addEventListener('click', function() {
            window.location.href = '/';
        });

        // ▼▼▼ 언어별 멘트 자동 변경 로직 ▼▼▼
        const msgElement = document.getElementById('dynamicMessage');
        
        // 한국어 멘트 리스트
        const msgsKo = [
            "✨ 우주의 기운을 연결하고 있습니다...",
            "🌟 별들의 배치를 계산하는 중입니다...",
            "🌙 당신의 과거 데이터를 스캔합니다...",
            "🔮 2026년의 흐름을 읽고 있습니다...",
            "⚡ 중요한 운명적 변수를 발견했습니다!",
            "🧘‍♂️ 신탁을 받아 적고 있습니다 (거의 다 됨)..."
        ];

        // 영어 멘트 리스트
        const msgsEn = [
            "✨ Connecting to cosmic energies...",
            "🌟 Calculating celestial alignments...",
            "🌙 Scanning your past resonance...",
            "🔮 Reading the flow of 2026...",
            "⚡ Analyzing critical destiny variables...",
            "🧘‍♂️ Transcribing the Oracle's vision..."
        ];

        // 현재 언어에 맞는 리스트 선택
        const msgs = isKorean ? msgsKo : msgsEn;
        
        let msgIndex = 0;
        if (msgElement) {
            // 시작하자마자 첫 멘트 적용
            msgElement.innerText = msgs[0];

            setInterval(() => {
                msgIndex = (msgIndex + 1) % msgs.length;
                msgElement.style.opacity = '0'; 
                setTimeout(() => {
                    msgElement.innerText = msgs[msgIndex];
                    msgElement.style.opacity = '1';
                }, 500);
            }, 4000); 
        }
    </script>
    </script>
</body>
</html>
