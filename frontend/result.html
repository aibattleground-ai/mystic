
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Fortune - MYSTIC AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif KR', serif;
            background: linear-gradient(180deg, #0a1929 0%, #000000 100%);
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated particles */
        .particle {
            position: fixed;
            font-size: 1.5rem;
            opacity: 0.15;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { 
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.15;
            }
            25% { 
                transform: translate(50px, -100px) rotate(90deg);
                opacity: 0.3;
            }
            50% { 
                transform: translate(-30px, -200px) rotate(180deg);
                opacity: 0.15;
            }
            75% { 
                transform: translate(-80px, -150px) rotate(270deg);
                opacity: 0.3;
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 30px;
            position: relative;
            z-index: 1;
        }

        /* Header with mystical character */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1.2s ease;
        }

        .mystical-character {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: levitate 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
        }

        @keyframes levitate {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            to { text-shadow: 0 0 40px rgba(212, 175, 55, 0.7); }
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            letter-spacing: 3px;
        }

        /* Decorative divider */
        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 40px auto;
            animation: expandWidth 1.5s ease;
        }

        @keyframes expandWidth {
            from { width: 0; }
            to { width: 200px; }
        }

        /* Result card with entrance animation */
        .result-card {
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 60px;
            margin-bottom: 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideInUp 1s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Fortune content styling */
        .fortune-content {
            line-height: 2.2;
            font-size: 1.1rem;
            white-space: pre-wrap;
            color: #e8e8e8;
            position: relative;
            z-index: 1;
        }

        .fortune-content::first-line {
            font-size: 1.3rem;
            color: #d4af37;
        }

        /* Animated decorative corners */
        .corner-decoration {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #d4af37;
            opacity: 0.3;
        }

        .corner-decoration.top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
            animation: cornerPulse 3s ease-in-out infinite;
        }

        .corner-decoration.bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
            animation: cornerPulse 3s ease-in-out infinite 1.5s;
        }

        @keyframes cornerPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Button with hover effects */
        .back-button {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #aa8a2e 100%);
            color: #0a1929;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .back-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .back-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
        }

        .button-container {
            text-align: center;
            margin-top: 50px;
            animation: fadeIn 2s ease;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 120px 20px;
        }

        .loading-character {
            font-size: 8rem;
            animation: spin 2s linear infinite;
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.6));
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.8rem;
            color: #d4af37;
            margin-top: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots span {
            animation: bounce 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            width: 3px;
            height: 200px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 3px;
            z-index: 100;
        }

        .scroll-progress {
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #d4af37, #ffd700);
            border-radius: 3px;
            transition: height 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <script>
        const particles = ['🔮', '✨', '⭐', '💫', '🌟', '✴️'];
        for(let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = particles[Math.floor(Math.random() * particles.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <!-- Scroll indicator -->
    <div class="scroll-indicator">
        <div class="scroll-progress" id="scrollProgress"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="mystical-character">🔮</div>
            <div class="logo">MYSTIC AI</div>
            <div class="subtitle">YOUR COSMIC FORTUNE REVEALED</div>
            <div class="divider"></div>
        </div>

        <div id="loading" class="loading">
            <div class="loading-character">✨</div>
            <div class="loading-text">
                Reading the cosmos
                <span class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </span>
            </div>
        </div>

        <div id="result" style="display: none;">
            <div class="result-card">
                <div class="corner-decoration top-left"></div>
                <div class="corner-decoration bottom-right"></div>
                <div id="fortune-content" class="fortune-content"></div>
            </div>

            <div class="button-container">
                <a href="index.html" class="back-button">← Get Another Reading</a>
            </div>
        </div>
    </div>

    <script>
        // Scroll progress indicator
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            document.getElementById('scrollProgress').style.height = scrollPercent + '%';
        });

        // Get fortune data
        const fortuneData = sessionStorage.getItem('fortuneData');

        if (fortuneData) {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('fortune-content').innerHTML = JSON.parse(fortuneData).replace(/\n/g, '<br>');
                sessionStorage.removeItem('fortuneData');
            }, 2500);
        } else {
            document.getElementById('loading').innerHTML = '<div class="loading-text">❌ No fortune data found</div>';
        }
    </script>
</body>
</html>
