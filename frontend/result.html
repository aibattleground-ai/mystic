<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cosmic Destiny - OracleEyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --gold: #FFD700;
            --deep-purple: #1a0b2e;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, #2a1b3d 0%, transparent 70%),
                radial-gradient(circle at 0% 50%, #1a0b2e 0%, transparent 50%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 배경 별 반짝임 */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
            animation: twinkle 10s infinite alternate;
        }
        @keyframes twinkle { from {opacity: 0.3;} to {opacity: 0.7;} }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* 로딩 화면 */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .orb {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--gold), transparent);
            box-shadow: 0 0 60px var(--gold), 0 0 100px purple;
            animation: pulseOrb 2s infinite alternate;
        }
        @keyframes pulseOrb { 
            from { transform: scale(1); opacity: 0.8; } 
            to { transform: scale(1.2); opacity: 1; } 
        }
        .loading-text {
            margin-top: 20px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 2px;
            animation: fadeText 1.5s infinite;
        }

        /* 결과 카드 (메인) */
        .result-card {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            margin-bottom: 30px;
            opacity: 0; /* 애니메이션용 */
            transform: translateY(50px);
            transition: all 1s ease;
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .oracle-eye {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--gold);
            animation: floatEye 3s ease-in-out infinite;
        }
        @keyframes floatEye { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }

        /* 마크다운 스타일링 (여기가 핵심) */
        .markdown-body {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #e0e0e0;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }
        .markdown-body h1 { font-size: 2rem; text-align: center; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .markdown-body h2 { font-size: 1.5rem; }
        .markdown-body h3 { font-size: 1.2rem; color: #bf9b30; }
        .markdown-body strong { color: #fff; font-weight: 700; background: linear-gradient(120deg, transparent 0%, rgba(255,215,0,0.2) 100%); }
        .markdown-body p { margin-bottom: 20px; text-align: justify; }
        .markdown-body ul { margin-left: 20px; margin-bottom: 20px; }
        .markdown-body li { margin-bottom: 10px; }
        .markdown-body blockquote {
            border-left: 3px solid var(--gold);
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
            color: #bbb;
            background: rgba(255,215,0,0.05);
            padding: 15px;
            border-radius: 0 10px 10px 0;
        }

        /* 액션 버튼들 */
        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), #d4af37);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }

        .share-tooltip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon);
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .result-card { padding: 30px 20px; }
            .markdown-body h1 { font-size: 1.5rem; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="loading">
        <div class="orb"></div>
        <div class="loading-text">CONSULTING THE STARS...</div>
    </div>

    <div class="container">
        <div class="result-card" id="resultCard">
            <div class="oracle-eye">👁️</div>
            <div id="fortune-content" class="markdown-body"></div>
        </div>

        <div class="action-bar" id="actionBar" style="opacity: 0; transition: opacity 1s 1s;">
            <button class="btn btn-secondary" onclick="saveImage()">
                <i class="fas fa-download"></i> Save Image
            </button>
            <button class="btn btn-secondary" onclick="shareResult()">
                <i class="fas fa-share-nodes"></i> Share
            </button>
            <button class="btn btn-primary" onclick="location.href='index.html'">
                <i class="fas fa-redo"></i> New Reading
            </button>
        </div>
    </div>

    <div id="toast" class="share-tooltip">Image Saved! 📸</div>

    <script>
        // 1. 데이터 가져오기
        const fortuneData = sessionStorage.getItem('fortuneData');
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('resultCard');
        const contentDiv = document.getElementById('fortune-content');
        const actionBar = document.getElementById('actionBar');

        if (fortuneData) {
            // 2. 파싱 및 마크다운 렌더링
            let rawText = JSON.parse(fortuneData);
            
            // 만약 백엔드에서 줄바꿈이 \n으로 온다면 마크다운으로 인식되게 처리
            // marked.js 라이브러리가 #, **, - 등을 HTML로 예쁘게 바꿔줌
            contentDiv.innerHTML = marked.parse(rawText);

            // 3. 로딩 종료 및 애니메이션
            setTimeout(() => {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                    resultCard.classList.add('show');
                    actionBar.style.opacity = '1';
                    
                    // 4. 팡팡 터지는 효과 (Confetti)
                    triggerConfetti();
                }, 500);
            }, 2000); // 2초 딜레이 (신비감 조성)

            // 데이터 삭제 (새로고침 방지)
            sessionStorage.removeItem('fortuneData');

        } else {
            // 데이터 없으면 홈으로
            location.href = 'index.html';
        }

        // ✨ 폭죽 효과 함수
        function triggerConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInOut(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // 금가루 색상
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInOut(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#FFD700', '#FFA500', '#FFFFFF']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInOut(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#FFD700', '#FFA500', '#FFFFFF']
                }));
            }, 250);
        }

        // 📸 이미지 저장 기능 (html2canvas 사용)
        function saveImage() {
            const card = document.querySelector('.result-card');
            
            // 캡처 중에는 그림자/여백 살짝 조정
            html2canvas(card, {
                backgroundColor: '#1a0b2e', // 배경색 지정
                scale: 2 // 고해상도
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_Mystic_Fortune_2026.png';
                link.href = canvas.toDataURL();
                link.click();
                
                showToast("Image Saved! 📸");
            });
        }

        // 🔗 공유 기능 (모바일 Native Share)
        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: 'OracleEyes AI Fortune',
                    text: 'I just read my 2026 destiny on OracleEyes! ✨',
                    url: window.location.href
                }).then(() => console.log('Successful share'))
                .catch((error) => console.log('Error sharing', error));
            } else {
                // PC 등 지원 안 할 땐 클립보드 복사
                navigator.clipboard.writeText(window.location.origin);
                showToast("Link Copied! 🔗");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }
    </script>
</body>
</html>
