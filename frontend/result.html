<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Fortune - oracleEyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif KR', serif;
            background: linear-gradient(180deg, #0a1929 0%, #000000 100%);
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            font-size: 1.5rem;
            opacity: 0.15;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.15; }
            25% { transform: translate(50px, -100px) rotate(90deg); opacity: 0.3; }
            50% { transform: translate(-30px, -200px) rotate(180deg); opacity: 0.15; }
            75% { transform: translate(-80px, -150px) rotate(270deg); opacity: 0.3; }
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 30px; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 60px; animation: fadeInDown 1.2s ease; }

        .mystical-character { font-size: 6rem; margin-bottom: 20px; animation: levitate 3s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4)); }

        @keyframes levitate { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        .logo { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: #d4af37; letter-spacing: 5px; margin-bottom: 15px; }

        .subtitle { color: #a0a0a0; font-size: 1.1rem; letter-spacing: 3px; }

        .divider { width: 200px; height: 2px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 40px auto; }

        .result-card {
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 60px;
            margin-bottom: 40px;
            animation: slideInUp 1s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .fortune-content {
            line-height: 2.2;
            font-size: 1.1rem;
            white-space: pre-wrap;
            color: #e8e8e8;
        }

        .loading { text-align: center; padding: 120px 20px; }

        .loading-text {
            font-size: 1.8rem;
            color: #d4af37;
            margin-top: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .back-button {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #aa8a2e 100%);
            color: #0a1929;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<script>
    const particles = ['🔮', '✨', '⭐', '💫', '🌟', '✴️'];
    for(let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = particles[Math.floor(Math.random() * particles.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        document.body.appendChild(particle);
    }
</script>

<div class="container">
    <div class="header">
        <div class="mystical-character">🔮</div>
        <div class="logo">oracleEyes</div>
        <div class="subtitle">YOUR DESTINY DECODED</div>
        <div class="divider"></div>
    </div>

    <div id="loading" class="loading">
        <div class="loading-text">
            Reading the cosmos<span class="loading-dots">...</span>
        </div>
    </div>

    <div id="result" style="display: none;">
        <div class="result-card">
            <div id="fortune-content" class="fortune-content"></div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-button">← Get Another Reading</a>
        </div>
    </div>
</div>

<script>
    const data = sessionStorage.getItem("fortuneData");

    function safeParse(str) {
        try { return JSON.parse(str); }
        catch { return str; }
    }

    function normalizeFortune(input) {
        if (!input) return "No Data";

        const parsed = safeParse(input);

        if (typeof parsed === "string") return parsed;

        if (Array.isArray(parsed)) return parsed.join("\n\n");

        return JSON.stringify(parsed, null, 2);
    }

    if (data) {
        const finalText = normalizeFortune(data);

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('fortune-content').innerHTML = finalText.replace(/\n/g, "<br>");
            sessionStorage.removeItem("fortuneData");
        }, 1500);
    } else {
        document.getElementById('loading').innerHTML =
            '<div class="loading-text">❌ No fortune data found</div>';
    }
</script>

</body>
</html>
